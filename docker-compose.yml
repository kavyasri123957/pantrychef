services:

  mysql:
    build: ./database
    container_name: pantrychef-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pantrychef

    ports:
      - "3306:3306"

  backend:
    build: ./backend
    container_name: pantrychef-backend
    restart: always

    ports:
      - "5000:5000"

    depends_on:
      - mysql

    environment:
      PORT: 5000
      JWT_SECRET: change-me-to-a-long-random-string
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: pantrychef

  frontend:
    build: ./frontend
    container_name: pantrychef-frontend
    restart: always

    depends_on:
      - backend

    ports:
      - "3000:80"