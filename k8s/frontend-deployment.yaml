apiVersion: apps/v1
kind: Deployment
metadata:
  name: pantrychef-frontend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: pantrychef-frontend

  template:
    metadata:
      labels:
        app: pantrychef-frontend

    spec:
      containers:
      - name: frontend
        image: nissankikavya/pantrychef-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: pantrychef-frontend-service

spec:
  type: NodePort

  selector:
    app: pantrychef-frontend

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080