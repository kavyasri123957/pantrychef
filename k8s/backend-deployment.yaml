apiVersion: apps/v1
kind: Deployment
metadata:
  name: pantrychef-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: pantrychef-backend

  template:
    metadata:
      labels:
        app: pantrychef-backend

    spec:
      containers:
      - name: backend
        image: nissankikavya/pantrychef-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service

metadata:
  name: pantrychef-backend-service

spec:
  type: NodePort

  selector:
    app: pantrychef-backend

  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30050